name: release

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to re-release from an existing tag."
        required: true
        type: choice
        options: [core, scanner, downloader]
      tag:
        description: "Existing package tag to (re-)build and release (e.g. scanner-v0.3.5)."
        required: true
        type: string
      skip_pypi:
        description: "Skip the PyPI upload step (still publishes the GitHub Release)."
        type: boolean
        default: false
      dependency_source:
        description: "Source of fabric-core when building scanner/downloader."
        type: choice
        options: [published, local]
        default: published

permissions:
  contents: read

jobs:
  release:
    name: re-release existing package tag
    uses: ./.github/workflows/release-package.yml
    permissions:
      contents: write
      id-token: write
    with:
      package: ${{ inputs.package }}
      skip_bump: true
      tag: ${{ inputs.tag }}
      dependency_source: ${{ inputs.dependency_source }}
      skip_pypi: ${{ inputs.skip_pypi }}
