name: release

# Builds and publishes fabric-scanner whenever a vX.Y.Z tag is pushed.
#
# Workflow:
#   1. Run the unit tests as a release gate.
#   2. Verify the tag (vX.Y.Z) matches the version in _version.py.
#   3. Build the wheel + sdist.
#   4. Create a GitHub Release for the tag with auto-generated notes
#      and the two artifacts attached.
#
# To cut a release after this lands:
#     git tag -a v0.3.2 -m "fabric-scanner v0.3.2"
#     git push origin v0.3.2
# The action does the rest.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re-)build and release (e.g. v0.3.2)"
        required: true
        type: string

permissions:
  contents: write   # required by softprops/action-gh-release to create / edit the release

defaults:
  run:
    working-directory: scannerHelper

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scannerHelper/pyproject.toml

      - name: Install build + test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests (release gate)
        run: pytest tests/unit/ -q

      - name: Verify tag matches _version.py
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-$GITHUB_REF_NAME}"
          tag_version="${tag#v}"
          file_version="$(python -c 'from fabric_scanner._version import __version__; print(__version__)')"
          echo "tag           = ${tag}"
          echo "tag_version   = ${tag_version}"
          echo "file_version  = ${file_version}"
          if [ "${tag_version}" != "${file_version}" ]; then
            echo "::error::Tag (${tag_version}) does not match _version.py (${file_version})."
            echo "Bump src/fabric_scanner/_version.py before tagging, or retag."
            exit 1
          fi

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade build
          rm -rf dist build *.egg-info
          python -m build

      - name: List built artifacts
        run: ls -la dist/

      - name: Smoke-test the freshly built wheel
        run: |
          python -m venv .venv-smoke
          ./.venv-smoke/bin/pip install --quiet dist/fabric_scanner-*.whl
          ./.venv-smoke/bin/python - <<'PY'
          from fabric_scanner import ScannerConfig, scan_notebook_bytes, __version__
          import os
          print("installed version:", __version__)
          path = "tests/fixtures/sample_secrets.ipynb"
          if not os.path.exists(path):
              # The fixture is gitignored; rebuild it via the project's helper.
              import subprocess, sys
              subprocess.check_call([sys.executable, "tests/fixtures/build_fixtures.py"])
          body = open(path, "rb").read()
          findings = scan_notebook_bytes(body, "sample_secrets.ipynb", ScannerConfig())
          print(f"{len(findings)} findings on sample_secrets.ipynb")
          assert len(findings) >= 10, f"expected >=10 findings, got {len(findings)}"
          PY

      - name: Create / update GitHub Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            scannerHelper/dist/fabric_scanner-*.whl
            scannerHelper/dist/fabric_scanner-*.tar.gz
