name: build

on:
  workflow_call:
    inputs:
      package:
        description: "Package to build: core, scanner, downloader, splitter, or tenant."
        required: true
        type: string
      ref:
        description: "Git ref to check out and build (branch, tag, or SHA). Defaults to the caller's ref."
        required: false
        type: string
        default: ""
      retention_days:
        description: "How long to keep the uploaded dist artifact."
        required: false
        type: number
        default: 7
      dependency_source:
        description: "Use local core from ../coreHelper or resolve fabric-core from PyPI."
        required: false
        type: string
        default: local

permissions:
  contents: read

jobs:
  build:
    name: test + build + smoke (${{ inputs.package }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PKG_DIR: ${{ inputs.package == 'core' && 'coreHelper' || inputs.package == 'scanner' && 'scannerHelper' || inputs.package == 'splitter' && 'splitterHelper' || inputs.package == 'tenant' && 'tenantHelper' || 'downloaderHelper' }}

    steps:
      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.package }}" in
            core|scanner|downloader|splitter|tenant) ;;
            *) echo "::error::Unknown package '${{ inputs.package }}'"; exit 1 ;;
          esac
          case "${{ inputs.dependency_source }}" in
            local|published) ;;
            *) echo "::error::Unknown dependency_source '${{ inputs.dependency_source }}'"; exit 1 ;;
          esac

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ inputs.package == 'core' && 'coreHelper/pyproject.toml' || inputs.package == 'scanner' && 'scannerHelper/pyproject.toml' || inputs.package == 'splitter' && 'splitterHelper/pyproject.toml' || inputs.package == 'tenant' && 'tenantHelper/pyproject.toml' || 'downloaderHelper/pyproject.toml' }}

      - name: Pre-install local fabric-core
        if: inputs.package != 'core' && inputs.dependency_source == 'local'
        working-directory: ${{ env.PKG_DIR }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ../coreHelper

      - name: Install package + dev deps
        working-directory: ${{ env.PKG_DIR }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests
        working-directory: ${{ env.PKG_DIR }}
        run: pytest tests/unit/ -q

      - name: Verify generated notebooks are in sync with build_notebook.py
        if: inputs.package != 'core' && inputs.package != 'splitter' && inputs.package != 'tenant'
        working-directory: ${{ env.PKG_DIR }}
        run: |
          python scripts/build_notebook.py
          if ! git diff --exit-code -- notebooks/; then
            echo ""
            echo "::error::notebooks/ is out of sync with scripts/build_notebook.py."
            echo "Run 'python scripts/build_notebook.py' locally and commit the result."
            exit 1
          fi

      - name: Build wheel + sdist
        working-directory: ${{ env.PKG_DIR }}
        run: |
          python -m pip install --upgrade build
          rm -rf dist build *.egg-info
          python -m build

      - name: List built artifacts
        working-directory: ${{ env.PKG_DIR }}
        run: ls -la dist/

      - name: Smoke-test fabric-core wheel
        if: inputs.package == 'core'
        working-directory: ${{ env.PKG_DIR }}
        run: |
          rm -rf .venv-smoke
          python -m venv .venv-smoke
          ./.venv-smoke/bin/pip install --quiet dist/fabric_core-*.whl
          ./.venv-smoke/bin/python -c "from fabric_core import auth, paths, enumerate, diagnostics, build_notebook; print('core smoke ok')"

      - name: Smoke-test fabric-scanner wheel
        if: inputs.package == 'scanner'
        working-directory: ${{ env.PKG_DIR }}
        env:
          DEPENDENCY_SOURCE: ${{ inputs.dependency_source }}
        run: |
          rm -rf .venv-smoke
          python -m venv .venv-smoke
          if [ "${DEPENDENCY_SOURCE}" = "local" ]; then
            ./.venv-smoke/bin/pip install --quiet ../coreHelper
          fi
          ./.venv-smoke/bin/pip install --quiet dist/fabric_scanner-*.whl
          ./.venv-smoke/bin/python - <<'PY'
          from fabric_scanner import ScannerConfig, scan_notebook_bytes, __version__
          import os
          print("installed version:", __version__)
          path = "tests/fixtures/sample_secrets.ipynb"
          if not os.path.exists(path):
              import subprocess, sys
              subprocess.check_call([sys.executable, "tests/fixtures/build_fixtures.py"])
          body = open(path, "rb").read()
          findings = scan_notebook_bytes(body, "sample_secrets.ipynb", ScannerConfig())
          print(f"{len(findings)} findings on sample_secrets.ipynb")
          assert len(findings) >= 10, f"expected >=10 findings, got {len(findings)}"
          PY

      - name: Smoke-test fabric-downloader wheel
        if: inputs.package == 'downloader'
        working-directory: ${{ env.PKG_DIR }}
        env:
          DEPENDENCY_SOURCE: ${{ inputs.dependency_source }}
        run: |
          rm -rf .venv-smoke
          python -m venv .venv-smoke
          if [ "${DEPENDENCY_SOURCE}" = "local" ]; then
            ./.venv-smoke/bin/pip install --quiet ../coreHelper
          fi
          ./.venv-smoke/bin/pip install --quiet dist/fabric_downloader-*.whl
          ./.venv-smoke/bin/python - <<'PY'
          from pathlib import Path
          from fabric_downloader import __version__
          namespace = {}
          exec(Path("src/fabric_downloader/_version.py").read_text(encoding="utf-8"), namespace)
          expected = namespace["__version__"]
          print("installed version:", __version__)
          assert __version__ == expected, f"expected {expected}, got {__version__}"
          PY

      - name: Smoke-test fabric-splitter wheel
        if: inputs.package == 'splitter'
        working-directory: ${{ env.PKG_DIR }}
        env:
          DEPENDENCY_SOURCE: ${{ inputs.dependency_source }}
        run: |
          rm -rf .venv-smoke
          python -m venv .venv-smoke
          if [ "${DEPENDENCY_SOURCE}" = "local" ]; then
            ./.venv-smoke/bin/pip install --quiet ../coreHelper
          fi
          ./.venv-smoke/bin/pip install --quiet dist/fabric_splitter-*.whl
          ./.venv-smoke/bin/python - <<'PY'
          from pathlib import Path
          from fabric_splitter import classify, __version__
          namespace = {}
          exec(Path("src/fabric_splitter/_version.py").read_text(encoding="utf-8"), namespace)
          expected = namespace["__version__"]
          print("installed version:", __version__)
          assert __version__ == expected, f"expected {expected}, got {__version__}"
          # Quick classify smoke test
          items = [{"id": "i1", "type": "Notebook"}, {"id": "i2", "type": "Report"}]
          result = classify(items, {"notebook"})
          assert result == {"i1": "A", "i2": "B"}, f"unexpected: {result}"
          print("splitter smoke ok")
          PY

      - name: Smoke-test fabric-tenant wheel
        if: inputs.package == 'tenant'
        working-directory: ${{ env.PKG_DIR }}
        env:
          DEPENDENCY_SOURCE: ${{ inputs.dependency_source }}
        run: |
          rm -rf .venv-smoke
          python -m venv .venv-smoke
          if [ "${DEPENDENCY_SOURCE}" = "local" ]; then
            ./.venv-smoke/bin/pip install --quiet ../coreHelper
          fi
          ./.venv-smoke/bin/pip install --quiet dist/fabric_tenant-*.whl
          ./.venv-smoke/bin/python - <<'PY'
          from pathlib import Path
          from fabric_tenant import __version__
          namespace = {}
          exec(Path("src/fabric_tenant/_version.py").read_text(encoding="utf-8"), namespace)
          expected = namespace["__version__"]
          print("installed version:", __version__)
          assert __version__ == expected, f"expected {expected}, got {__version__}"
          # CLI parser must build cleanly.
          from fabric_tenant import cli
          parser = cli.build_parser()
          for sub in ("snapshot", "diff", "compare", "drift"):
              parser.parse_args([sub])
          print("tenant smoke ok")
          PY

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ inputs.package }}
          path: ${{ env.PKG_DIR }}/dist/*
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days }}
