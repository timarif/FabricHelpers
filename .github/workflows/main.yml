name: main

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      package:
        type: choice
        options: [core, scanner, downloader, mpe]
        required: true
      bump:
        type: choice
        options: [patch, minor, major]
        default: patch
      version:
        type: string
        default: ""
      skip_pypi:
        description: "Skip the PyPI upload step (still publishes GitHub Release)."
        type: boolean
        default: false
      dependency_source_override:
        description: "Override fabric-core source for builds. auto = 'local' (default) until fabric-core is on PyPI."
        type: choice
        options: [auto, local, published]
        default: auto

permissions:
  contents: read

concurrency:
  group: main-release-pipeline
  cancel-in-progress: false

jobs:
  detect:
    name: detect packages to release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.outputs.outputs.should_run }}
      core: ${{ steps.outputs.outputs.core }}
      scanner: ${{ steps.outputs.outputs.scanner }}
      downloader: ${{ steps.outputs.outputs.downloader }}
      mpe: ${{ steps.outputs.outputs.mpe }}

    steps:
      - name: Checkout main with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Honor [skip release] opt-out
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            msg="$(git log -1 --pretty=%B)"
            echo "head commit message:"
            echo "${msg}"
            if echo "${msg}" | grep -qE '\[skip release\]'; then
              echo "::notice::Found [skip release] — exiting pipeline early."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Detect changed package paths
        if: github.event_name == 'push' && steps.gate.outputs.should_run == 'true'
        id: changes
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}
          filters: |
            core:
              - 'coreHelper/**'
            scanner:
              - 'scannerHelper/**'
            downloader:
              - 'downloaderHelper/**'
            mpe:
              - 'mpeHelper/**'

      - name: Set detection outputs
        id: outputs
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_PACKAGE: ${{ inputs.package || '' }}
          SHOULD_RUN: ${{ steps.gate.outputs.should_run }}
          PATH_CORE: ${{ steps.changes.outputs.core || 'false' }}
          PATH_SCANNER: ${{ steps.changes.outputs.scanner || 'false' }}
          PATH_DOWNLOADER: ${{ steps.changes.outputs.downloader || 'false' }}
          PATH_MPE: ${{ steps.changes.outputs.mpe || 'false' }}
        run: |
          set -euo pipefail
          core=false
          scanner=false
          downloader=false
          mpe=false

          if [ "${SHOULD_RUN}" = "true" ]; then
            if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
              case "${MANUAL_PACKAGE}" in
                core) core=true ;;
                scanner) scanner=true ;;
                downloader) downloader=true ;;
                mpe) mpe=true ;;
                *) echo "::error::Unknown manual package '${MANUAL_PACKAGE}'"; exit 1 ;;
              esac
            else
              core="${PATH_CORE}"
              scanner="${PATH_SCANNER}"
              downloader="${PATH_DOWNLOADER}"
              mpe="${PATH_MPE}"
            fi
          fi

          echo "should_run=${SHOULD_RUN}" >> "$GITHUB_OUTPUT"
          echo "core=${core}" >> "$GITHUB_OUTPUT"
          echo "scanner=${scanner}" >> "$GITHUB_OUTPUT"
          echo "downloader=${downloader}" >> "$GITHUB_OUTPUT"
          echo "mpe=${mpe}" >> "$GITHUB_OUTPUT"
          echo "should_run=${SHOULD_RUN} core=${core} scanner=${scanner} downloader=${downloader} mpe=${mpe}"

  release-core:
    name: release core
    needs: detect
    if: needs.detect.outputs.should_run == 'true' && needs.detect.outputs.core == 'true'
    uses: ./.github/workflows/release-package.yml
    permissions:
      contents: write
      id-token: write
    with:
      package: core
      bump: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}
      version_override: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
      dependency_source: local
      skip_pypi: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_pypi || false }}

  wait-for-core-pypi:
    name: wait for fabric-core on PyPI
    needs: release-core
    if: always() && needs.release-core.result == 'success' && !(github.event_name == 'workflow_dispatch' && inputs.skip_pypi)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Wait for PyPI propagation
        shell: bash
        run: |
          set -e
          CORE_VERSION="${{ needs.release-core.outputs.version }}"
          python -m pip install --upgrade pip
          for i in {1..60}; do
            if python -m pip install --no-cache-dir --index-url https://pypi.org/simple/ "fabric-core==${CORE_VERSION}"; then
              echo "fabric-core ${CORE_VERSION} is on PyPI"
              exit 0
            fi
            sleep 10
          done
          echo "::error::fabric-core ${CORE_VERSION} never appeared on PyPI after 10 minutes"
          exit 1

  release-scanner:
    name: release scanner
    needs: [detect, release-core, wait-for-core-pypi]
    if: |
      always() &&
      needs.detect.outputs.should_run == 'true' &&
      needs.detect.outputs.scanner == 'true' &&
      (needs.release-core.result == 'success' || needs.release-core.result == 'skipped') &&
      (needs.wait-for-core-pypi.result == 'success' || needs.wait-for-core-pypi.result == 'skipped')
    uses: ./.github/workflows/release-package.yml
    permissions:
      contents: write
      id-token: write
    with:
      package: scanner
      bump: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}
      version_override: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
      dependency_source: ${{ (github.event_name == 'workflow_dispatch' && inputs.dependency_source_override != 'auto') && inputs.dependency_source_override || 'local' }}
      skip_pypi: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_pypi || false }}

  release-downloader:
    name: release downloader
    needs: [detect, release-core, wait-for-core-pypi, release-scanner]
    if: |
      always() &&
      needs.detect.outputs.should_run == 'true' &&
      needs.detect.outputs.downloader == 'true' &&
      (needs.release-core.result == 'success' || needs.release-core.result == 'skipped') &&
      (needs.wait-for-core-pypi.result == 'success' || needs.wait-for-core-pypi.result == 'skipped') &&
      (needs.release-scanner.result == 'success' || needs.release-scanner.result == 'skipped')
    uses: ./.github/workflows/release-package.yml
    permissions:
      contents: write
      id-token: write
    with:
      package: downloader
      bump: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}
      version_override: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
      dependency_source: ${{ (github.event_name == 'workflow_dispatch' && inputs.dependency_source_override != 'auto') && inputs.dependency_source_override || 'local' }}
      skip_pypi: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_pypi || false }}

  release-mpe:
    name: release mpe
    needs: [detect, release-core, wait-for-core-pypi, release-scanner, release-downloader]
    if: |
      always() &&
      needs.detect.outputs.should_run == 'true' &&
      needs.detect.outputs.mpe == 'true' &&
      (needs.release-core.result == 'success' || needs.release-core.result == 'skipped') &&
      (needs.wait-for-core-pypi.result == 'success' || needs.wait-for-core-pypi.result == 'skipped') &&
      (needs.release-scanner.result == 'success' || needs.release-scanner.result == 'skipped') &&
      (needs.release-downloader.result == 'success' || needs.release-downloader.result == 'skipped')
    uses: ./.github/workflows/release-package.yml
    permissions:
      contents: write
      id-token: write
    with:
      package: mpe
      bump: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}
      version_override: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
      dependency_source: ${{ (github.event_name == 'workflow_dispatch' && inputs.dependency_source_override != 'auto') && inputs.dependency_source_override || 'local' }}
      skip_pypi: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_pypi || false }}
