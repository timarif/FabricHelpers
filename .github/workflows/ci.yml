name: ci

# Continuous integration for pull requests against `main`.
#
# Post-merge validation, version-bump, and release publishing all
# happen in main.yml (which runs on `push: main`). Keeping the two
# concerns in separate workflow files avoids race conditions and lets
# this workflow stay simple/fast for PR feedback.

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

# Cancel in-progress runs of this workflow when a new commit lands on
# the same PR. Saves runner time and keeps the status check focused on
# the latest commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}
      retention_days: 7
