name: ci

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        package: [core, scanner, downloader, splitter]
    uses: ./.github/workflows/build.yml
    with:
      package: ${{ matrix.package }}
      ref: ${{ github.event.pull_request.head.sha || github.sha }}
      retention_days: 7
      dependency_source: local

  terraform:
    name: terraform (fmt + validate + unit tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      contains(github.event.pull_request.changed_files, 'mpeHelper/terraform') ||
      github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: mpeHelper/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: terraform fmt -check
        run: terraform fmt -check -recursive

      - name: terraform init (providers only — no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run script unit tests
        run: |
          python -m pip install --upgrade pip pytest
          pytest scripts/tests/ -v
