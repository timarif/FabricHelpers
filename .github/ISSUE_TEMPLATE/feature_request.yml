name: ✨ Feature request
description: Propose a new helper, or an enhancement to an existing one.
title: "[Feature]: "
labels: ["enhancement", "agent-ok"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement to **FabricHelpers**!
        Please give enough context that a contributor can pick this up cold.

  - type: dropdown
    id: helper
    attributes:
      label: Which helper does this relate to?
      options:
        - coreHelper
        - scannerHelper
        - downloaderHelper
        - mpeHelper
        - New helper (describe below)
        - Repository-wide / tooling
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? Who is affected and how often?
      placeholder: |
        Today, doing X requires …
        This is painful because …
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior. Include CLI/notebook surface, inputs, outputs, and any new files or modules.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope / acceptance criteria
      description: A checklist of what must be true for this issue to be considered done.
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you rejected them.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, screenshots, related issues/PRs, REST API docs, etc.
    validations:
      required: false
